<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockNova - Личный кабинет</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a0033);
            color: #fff;
            margin: 0;
            padding: 40px;
        }
        .cabinet {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(20, 20, 40, 0.95);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #8a2be2;
        }
        h1 { 
            color: #8a2be2; 
            text-align: center; 
            margin-bottom: 30px;
        }
        .info { 
            margin: 25px 0; 
            line-height: 1.8; 
            font-size: 1.1em;
        }
        .back { 
            text-align: center; 
            margin-top: 40px;
        }
        .back a {
            color: #8a2be2;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="cabinet">
        <h1>🔐 Личный кабинет BlockNova</h1>
        <div class="info" id="clientInfo">
            Загрузка данных...
        </div>
        <div class="back">
            <a href="/">← Вернуться на главную</a>
        </div>
    </div>

    <script>
        async function loadClientData() {
            const address = window.location.pathname.split('/client/')[1];
            if (!address) {
                document.getElementById('clientInfo').innerHTML = "<p style='color:red'>Ошибка: адрес не найден</p>";
                return;
            }

            try {
                const response = await fetch(`/api/client/${address}`);
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                
                document.getElementById('clientInfo').innerHTML = `
                    <p><strong>Адрес:</strong> ${data.address}</p>
                    <p><strong>Имя:</strong> ${data.username || 'Не указано'}</p>
                    <p><strong>Email:</strong> ${data.email || 'Не указано'}</p>
                    <p><strong>Дата создания:</strong> ${new Date(data.createdAt).toLocaleString('ru-RU')}</p>
                    <p style="color:#00ff9d; margin-top:20px;">✅ Данные успешно сохранены</p>
                `;
            } catch(e) {
                document.getElementById('clientInfo').innerHTML = `
                    <p style="color:orange;">⚠️ Клиент найден, но данные не удалось загрузить.</p>
                    <p><strong>Адрес:</strong> ${address}</p>
                `;
            }
        }
        window.onload = loadClientData;
    </script>
</body>
</html>
